<script>
const EMOJIS=['🗻','⛰️','🌿','🍂','🌲','🌸','❄️','🌄','🏕️','🦅','🌾','🍃','🏔️','🌊'];
const BGS=['linear-gradient(135deg,#e8f4e8,#d4ecd4)','linear-gradient(135deg,#eaecf8,#dce0f4)','linear-gradient(135deg,#fdf0e4,#f8e4cc)','linear-gradient(135deg,#e8f0fc,#d4e4f8)','linear-gradient(135deg,#fce8f4,#f8d4ec)','linear-gradient(135deg,#f4fce8,#e4f8d4)','linear-gradient(135deg,#fce8e8,#f8d4d4)','linear-gradient(135deg,#e8f8fc,#d4ecf8)'];
let mountains=[],climbs=[],customBadges=[],nextMtnId=10,nextClimbId=500;
const DEFAULT_MOUNTAINS=[{id:1,name:'富士山',elevation:3776,location:'静岡県・山梨県',tags:['百名山','日本最高峰'],emoji:'🗻',bg:'linear-gradient(135deg,#e8f4e8,#d4ecd4)'},{id:2,name:'尾瀬・至仏山',elevation:2228,location:'群馬県',tags:['百名山','高山植物'],emoji:'🌿',bg:'linear-gradient(135deg,#e8f0e4,#d8e8d0)'},{id:3,name:'槍ヶ岳',elevation:3180,location:'長野県・岐阜県',tags:['百名山','岩稜'],emoji:'⛰️',bg:'linear-gradient(135deg,#eaecf8,#dce0f4)'},{id:4,name:'高尾山',elevation:599,location:'東京都',tags:['ハイキング'],emoji:'🍂',bg:'linear-gradient(135deg,#fdf0e4,#f8e4cc)'}];
const DEFAULT_CLIMBS=[{id:101,mtnId:1,date:'2022-08-20',distance:14.2,duration:'9h 00m',difficulty:'上級',weather:'晴れのち曇り',with:'ソロ',note:'初めての富士山。吉田ルートで登頂。高山病で少し頭痛があったが無事登頂できた。御来光は雲で見えなかったのが残念。',photos:['https://images.unsplash.com/photo-1490806843957-31f4c9a91c65?w=600&q=80']},{id:102,mtnId:1,date:'2024-09-15',distance:13.8,duration:'8h 30m',difficulty:'上級',weather:'快晴',with:'友人2人',note:'2回目の富士山。今回は御殿場ルートに挑戦。御来光が絶景！',photos:['https://images.unsplash.com/photo-1542082873-c1a13c90ac84?w=600&q=80','https://images.unsplash.com/photo-1570521462033-3015e76e7432?w=600&q=80']},{id:201,mtnId:2,date:'2024-07-22',distance:9.6,duration:'5h 15m',difficulty:'中級',weather:'晴れ',with:'家族3人',note:'ニッコウキスゲが満開。湿原の風景が最高だった。',photos:['https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80']},{id:301,mtnId:3,date:'2024-08-10',distance:22.4,duration:'2日間',difficulty:'上級',weather:'晴れ',with:'山岳会メンバー',note:'穂先への登りはスリル満点。山荘での星空が忘れられない。',photos:['https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=80']},{id:401,mtnId:4,date:'2023-04-08',distance:5.2,duration:'2h 20m',difficulty:'初級',weather:'晴れ',with:'家族4人',note:'春の高尾山。桜が綺麗だった。',photos:[]},{id:402,mtnId:4,date:'2023-11-12',distance:5.8,duration:'2h 40m',difficulty:'初級',weather:'快晴',with:'ソロ',note:'紅葉が見頃。山頂から富士山が綺麗に見えた。',photos:['https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600&q=80']},{id:403,mtnId:4,date:'2024-03-20',distance:6.1,duration:'3h 00m',difficulty:'初級',weather:'曇り',with:'友人1人',note:'春霞の高尾山。梅が咲いていて良かった。',photos:[]}];

const SK='mj_v3';

// ── IndexedDB（写真専用） ────────────────────────────────
let _db=null;
function _openDB(){
  return new Promise((res,rej)=>{
    if(_db){res(_db);return;}
    const req=indexedDB.open('mj_photos',1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore('photos',{keyPath:'k'});
    req.onsuccess=e=>{_db=e.target.result;res(_db);};
    req.onerror=e=>rej(e);
  });
}
function _idbPut(k,v){return _openDB().then(d=>new Promise((res,rej)=>{const tx=d.transaction('photos','readwrite');tx.objectStore('photos').put({k,v});tx.oncomplete=res;tx.onerror=rej;}));}
function _idbGet(k){return _openDB().then(d=>new Promise((res,rej)=>{const r=d.transaction('photos','readonly').objectStore('photos').get(k);r.onsuccess=e=>res(e.target.result?.v||null);r.onerror=rej;}));}
function _idbDel(k){return _openDB().then(d=>new Promise((res,rej)=>{const tx=d.transaction('photos','readwrite');tx.objectStore('photos').delete(k);tx.oncomplete=res;tx.onerror=rej;}));}
function _idbAll(){return _openDB().then(d=>new Promise((res,rej)=>{const r=d.transaction('photos','readonly').objectStore('photos').getAll();r.onsuccess=e=>res(e.target.result||[]);r.onerror=rej;}));}

async function _savePhotos(cid,urls){
  const all=await _idbAll();
  const old=all.filter(r=>r.k.startsWith('p_'+cid+'_')).map(r=>r.k);
  await Promise.all(old.map(k=>_idbDel(k)));
  await Promise.all(urls.map((u,i)=>_idbPut('p_'+cid+'_'+i,u)));
}
async function _loadPhotos(cid){
  const all=await _idbAll();
  return all.filter(r=>r.k.startsWith('p_'+cid+'_')).sort((a,b)=>{
    return parseInt(a.k.split('_').pop())-parseInt(b.k.split('_').pop());
  }).map(r=>r.v);
}
async function _delPhotos(cid){
  const all=await _idbAll();
  await Promise.all(all.filter(r=>r.k.startsWith('p_'+cid+'_')).map(r=>_idbDel(r.k)));
}

// ── localStorage（メタデータのみ） ──────────────────────
function loadData(){
  try{
    const s=localStorage.getItem(SK);
    if(s){
      const d=JSON.parse(s);
      mountains=d.mountains||[];climbs=d.climbs||[];customBadges=d.customBadges||[];
      nextMtnId=d.nextMtnId||10;nextClimbId=d.nextClimbId||500;
      return;
    }
  }catch(e){}
  mountains=JSON.parse(JSON.stringify(DEFAULT_MOUNTAINS));
  climbs=JSON.parse(JSON.stringify(DEFAULT_CLIMBS));
  customBadges=[];
}
function saveAll(){
  try{
    // 写真はIndexedDBに保存するのでlocalStorageには含めない
    const meta=climbs.map(c=>({...c,photos:(c.photos||[]).filter(u=>!u.startsWith('data:'))}));
    localStorage.setItem(SK,JSON.stringify({mountains,climbs:meta,customBadges,nextMtnId,nextClimbId}));
  }catch(e){
    toast('❌ 保存失敗：'+e.message);console.warn(e);
  }
}
async function _initApp(){
  loadData();
  // 旧データ移行：localStorageにbase64写真が残っている場合はIndexedDBへ移す
  let migrated=false;
  for(const c of climbs){
    const b64=(c.photos||[]).filter(u=>u.startsWith('data:'));
    if(b64.length){await _savePhotos(c.id,b64);c.photos=(c.photos||[]).filter(u=>!u.startsWith('data:'));migrated=true;}
  }
  if(migrated){saveAll();toast('📦 写真を新しい保存方式に移行しました');}
  // IndexedDBから写真を読み込んでメモリ上のclimbsに反映
  await Promise.all(climbs.map(async c=>{
    const idb=await _loadPhotos(c.id);
    if(idb.length)c.photos=[...(c.photos||[]),...idb];
    if(!c.photos)c.photos=[];
  }));
  render();
}

function openIoPanel(){document.getElementById('io-overlay').classList.remove('hidden');}
function closeIoPanel(){document.getElementById('io-overlay').classList.add('hidden');}

// iPhone用：写真なしJSON
function doExportMeta(){
  const climbsMeta=climbs.map(c=>({...c,photos:(c.photos||[]).filter(u=>!u.startsWith('data:'))}));
  const data={version:4,exportedAt:new Date().toISOString(),mountains,climbs:climbsMeta,customBadges,nextMtnId,nextClimbId};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'');
  a.href=url;a.download='峰々の記録_'+date+'.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('📤 JSONエクスポート完了！LINEでiPhoneに送ってください');
}

// PC用：写真込みZIP
async function doExport(){
  const btn=document.getElementById('export-btn');
  btn.style.opacity='.5';btn.style.pointerEvents='none';
  try{
    const zip=new JSZip();
    const climbsMeta=climbs.map(c=>({...c,photos:(c.photos||[]).filter(u=>!u.startsWith('data:'))}));
    const meta={version:4,exportedAt:new Date().toISOString(),mountains,climbs:climbsMeta,customBadges,nextMtnId,nextClimbId};
    zip.file('data.json',JSON.stringify(meta,null,2));
    const photoFolder=zip.folder('photos');
    for(const c of climbs){
      const b64photos=(c.photos||[]).filter(u=>u.startsWith('data:'));
      b64photos.forEach((u,i)=>{
        const b64=u.replace(/^data:image\/\w+;base64,/,'');
        const ext=u.match(/data:image\/(\w+)/)?.[1]||'jpg';
        photoFolder.file(c.id+'_'+i+'.'+ext,b64,{base64:true});
      });
    }
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const date=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'');
    a.href=url;a.download='峰々の記録_'+date+'.zip';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    toast('📦 ZIPエクスポート完了！');
  }catch(err){
    toast('❌ エクスポート失敗: '+err.message);console.error(err);
  }
  btn.style.opacity='';btn.style.pointerEvents='';
}

function doImport(e,type){
  const file=e.target.files[0];if(!file)return;
  const isZip=(type==='zip')||file.name.endsWith('.zip');
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      let importedMeta,photoMap={};
      if(isZip){
        const zip=await JSZip.loadAsync(ev.target.result);
        const jsonFile=zip.file('data.json');
        if(!jsonFile){alert('data.jsonが見つかりません');return;}
        importedMeta=JSON.parse(await jsonFile.async('string'));
        const photoFiles=zip.folder('photos');
        if(photoFiles){
          const promises=[];
          photoFiles.forEach((path,f)=>{
            if(f.dir)return;
            promises.push(f.async('base64').then(b64=>{
              const name=path.replace('photos/','');
              const ext=name.split('.').pop()||'jpg';
              const [cidStr,idxStr]=name.replace('.'+ext,'').split('_');
              const cid=parseInt(cidStr),idx=parseInt(idxStr);
              if(!photoMap[cid])photoMap[cid]=[];
              photoMap[cid][idx]='data:image/'+ext+';base64,'+b64;
            }));
          });
          await Promise.all(promises);
        }
      } else {
        importedMeta=JSON.parse(ev.target.result);
      }
      if(!importedMeta.mountains||!importedMeta.climbs){alert('データが見つかりません');return;}
      if(!confirm('📥 インポートしますか？\n\n山：'+importedMeta.mountains.length+'座　登頂記録：'+importedMeta.climbs.length+'件\n\n※現在のデータは上書きされます'))return;
      mountains=importedMeta.mountains;
      customBadges=importedMeta.customBadges||[];
      nextMtnId=importedMeta.nextMtnId||10;
      nextClimbId=importedMeta.nextClimbId||500;
      climbs=await Promise.all(importedMeta.climbs.map(async c=>{
        const fromZip=photoMap[c.id]||[];
        const fromJson=(c.photos||[]).filter(u=>u.startsWith('data:'));
        const allB64=[...fromZip,...fromJson];
        const extPhotos=(c.photos||[]).filter(u=>!u.startsWith('data:'));
        if(allB64.length)await _savePhotos(c.id,allB64);
        return {...c,photos:[...extPhotos,...allB64]};
      }));
      saveAll();render();switchTab('home',document.querySelectorAll('.tb')[0]);closeIoPanel();
      toast('✓ インポート完了！山'+importedMeta.mountains.length+'座・登頂'+importedMeta.climbs.length+'件');
    }catch(err){alert('読み込みに失敗しました: '+err.message);console.error(err);}
    e.target.value='';
  };
  if(isZip)reader.readAsArrayBuffer(file);
  else reader.readAsText(file);
}

function buildYearlyHtml(){
  // 年ごとに集計
  const yearMap={};
  climbs.forEach(c=>{
    const y=c.date?c.date.slice(0,4):'不明';
    if(!yearMap[y])yearMap[y]={year:y};
  });
  const years=Object.keys(yearMap).sort((a,b)=>b.localeCompare(a));
  if(!years.length)return '';
  const cards=years.map(y=>{
    const yc=climbs.filter(c=>c.date&&c.date.startsWith(y));
    const summits=yc.filter(c=>!c.partial);
    const partials=yc.filter(c=>c.partial);
    const mtnSet=new Set(summits.map(c=>c.mtnId));
    // 山ごとにまとめる
    const byMtn={};
    yc.forEach(c=>{
      if(!byMtn[c.mtnId])byMtn[c.mtnId]={mtnId:c.mtnId,s:0,p:0};
      c.partial?byMtn[c.mtnId].p++:byMtn[c.mtnId].s++;
    });
    const rows=Object.values(byMtn).map(r=>{
      const m=mountains.find(x=>x.id===r.mtnId);
      if(!m)return '';
      return '<div class="yr-row" onclick="showDetail('+m.id+')" style="cursor:pointer">'
        +'<div class="yr-mtn-ico" style="background:'+m.bg+'">'+m.emoji+'</div>'
        +'<div style="flex:1"><div class="yr-mtn-name">'+esc(m.name)+'</div>'
        +'<div class="yr-mtn-sub">'+(m.elevation?m.elevation+'m · ':'')+esc(m.location||'')+'</div></div>'
        +'<div class="yr-mtn-cnt">'
        +(r.s?'<span class="yr-badge yr-badge-g">'+r.s+'登頂</span>':'')
        +(r.p?'<span class="yr-badge yr-badge-p">⚠️'+r.p+'途中</span>':'')
        +'<span style="color:#5aaa78;font-size:16px;margin-left:4px">›</span>'
        +'</div></div>';
    }).join('');
    return '<div class="yr-card">'
      +'<div class="yr-head" onclick="toggleYr(\''+y+'\')">'
      +'<div class="yr-year">'+y+'年</div>'
      +'<div class="yr-summary">'
      +'<span class="yr-badge yr-badge-g">'+mtnSet.size+'座 · '+summits.length+'登頂</span>'
      +(partials.length?'<span class="yr-badge yr-badge-p">⚠️'+partials.length+'途中下山</span>':'')
      +'</div>'
      +'<span class="yr-chevron" id="yr-chev-'+y+'">›</span>'
      +'</div>'
      +'<div class="yr-body" id="yr-body-'+y+'">'
      +'<div class="yr-rows">'+rows+'</div>'
      +'</div></div>';
  }).join('');
  return '<div class="sl">年度別集計</div><div class="yr-section">'+cards+'</div>';
}

function renderMmTags(){const wrap=document.getElementById('mm-tags-wrap');const inp=document.getElementById('mm-tag-input');wrap.innerHTML='';mmTags.forEach(t=>{const s=document.createElement('span');s.className='tc';s.innerHTML=`${esc(t)}<button onclick="removeMmTag('${esc(t)}')" title="削除">✕</button>`;wrap.appendChild(s);});wrap.appendChild(inp);}
function submitMtn(){const name=document.getElementById('mm-name').value.trim();if(!name){alert('山の名前を入力してください');return}if(editingMtnId!==null){const idx=mountains.findIndex(m=>m.id===editingMtnId);if(idx>=0)mountains[idx]={...mountains[idx],name,elevation:+document.getElementById('mm-elev').value||null,location:document.getElementById('mm-loc').value.trim()||null,tags:[...mmTags]};toast('山の情報を更新しました ✓');}else{const id=nextMtnId++;mountains.push({id,name,elevation:+document.getElementById('mm-elev').value||null,location:document.getElementById('mm-loc').value.trim()||null,tags:[...mmTags],emoji:EMOJIS[id%EMOJIS.length],bg:BGS[id%BGS.length]});toast('山を追加しました ✓');}saveAll();closeMtnModal();render();if(editingMtnId!==null)showDetail(editingMtnId);else switchTab('hikes',document.querySelectorAll('.tb')[1]);}
function openClimbModal(mtnId){editingClimbId=null;climbForMtnId=mtnId;modalPhotos=[];const m=mountains.find(x=>x.id===mtnId);document.getElementById('cm-title').textContent='登頂記録を追加';document.getElementById('cm-mtn-emoji').textContent=m?m.emoji:'⛰️';document.getElementById('cm-mtn-name-display').textContent=m?`📍 ${m.name}　${m.elevation?m.elevation+'m':''}${m.location?' · '+m.location:''}`:'';['cm-date','cm-dist','cm-dur','cm-weather','cm-with','cm-note'].forEach(id=>document.getElementById(id).value='');document.getElementById('cm-diff').value='初級';document.getElementById('cm-partial').checked=false;document.getElementById('cm-pmg').innerHTML='';document.getElementById('climb-modal').classList.remove('hidden');}
function openEditClimbModal(cid){const c=climbs.find(x=>x.id===cid);if(!c)return;const m=mountains.find(x=>x.id===c.mtnId);editingClimbId=cid;climbForMtnId=c.mtnId;modalPhotos=(c.photos||[]).map(u=>({url:u,isNew:false}));document.getElementById('cm-title').textContent='登頂記録を編集';document.getElementById('cm-mtn-emoji').textContent=m?m.emoji:'⛰️';document.getElementById('cm-mtn-name-display').textContent=m?`📍 ${m.name}`:'';document.getElementById('cm-date').value=c.date||'';document.getElementById('cm-dist').value=c.distance||'';document.getElementById('cm-dur').value=c.duration||'';document.getElementById('cm-diff').value=c.difficulty||'初級';document.getElementById('cm-weather').value=c.weather||'';document.getElementById('cm-with').value=c.with||'';document.getElementById('cm-note').value=c.note||'';document.getElementById('cm-partial').checked=c.partial||false;renderClimbPmg();document.getElementById('climb-modal').classList.remove('hidden');}
function closeClimbModal(){document.getElementById('climb-modal').classList.add('hidden')}
function compressImage(file,maxW,maxH,quality){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxW||h>maxH){
          const ratio=Math.min(maxW/w,maxH/h);
          w=Math.round(w*ratio);h=Math.round(h*ratio);
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(file);
  });
}
function handleClimbPhotos(e){
  const files=Array.from(e.target.files);
  let done=0;
  files.forEach(file=>{
    compressImage(file,1200,1200,0.75).then(url=>{
      modalPhotos.push({url,isNew:true});
      done++;
      if(done===files.length)renderClimbPmg();
    });
  });
  e.target.value='';
}
function removeClimbPhoto(i){modalPhotos.splice(i,1);renderClimbPmg()}
function renderClimbPmg(){document.getElementById('cm-pmg').innerHTML=modalPhotos.map((p,i)=>`<div class="pm-thumb"><img src="${p.url}" alt=""><button class="pm-del" onclick="removeClimbPhoto(${i})">✕</button>${i===0?'<div class="pm-badge">表紙</div>':''}</div>`).join('');}
function submitClimb(){
  const date=document.getElementById('cm-date').value;
  if(!date){alert('日付を選択してください');return;}
  const allPhotos=modalPhotos.map(p=>p.url);
  const extPhotos=allPhotos.filter(u=>!u.startsWith('data:'));
  const b64Photos=allPhotos.filter(u=>u.startsWith('data:'));
  const data={mtnId:climbForMtnId,date,distance:+document.getElementById('cm-dist').value||null,duration:document.getElementById('cm-dur').value.trim()||null,difficulty:document.getElementById('cm-diff').value,weather:document.getElementById('cm-weather').value.trim()||null,with:document.getElementById('cm-with').value.trim()||null,note:document.getElementById('cm-note').value.trim(),partial:document.getElementById('cm-partial').checked,photos:allPhotos};
  let targetId;
  if(editingClimbId!==null){const idx=climbs.findIndex(c=>c.id===editingClimbId);if(idx>=0)climbs[idx]={...climbs[idx],...data};targetId=editingClimbId;toast('登頂記録を更新しました ✓');}
  else{data.id=nextClimbId++;climbs.push(data);targetId=data.id;toast('登頂記録を追加しました ✓');}
  _savePhotos(targetId,b64Photos).then(()=>{saveAll();closeClimbModal();render();showDetail(climbForMtnId,targetId);});
}
function confirmDelMtn(mtnId){const m=mountains.find(x=>x.id===mtnId);if(!m)return;const n=mClimbs(mtnId).length;document.getElementById('cm-txt').textContent=`「${m.name}」とすべての登頂記録（${n}件）を削除します。`;document.getElementById('cok').onclick=async()=>{await Promise.all(mClimbs(mtnId).map(c=>_delPhotos(c.id)));mountains=mountains.filter(x=>x.id!==mtnId);climbs=climbs.filter(c=>c.mtnId!==mtnId);saveAll();render();switchTab('hikes',document.querySelectorAll('.tb')[1]);closeConfirm();toast('削除しました')};document.getElementById('confirm').classList.remove('hidden');}
function confirmDelClimb(cid){const c=climbs.find(x=>x.id===cid);if(!c)return;const m=mountains.find(x=>x.id===c.mtnId);const cs=mClimbs(c.mtnId);const num=cs.findIndex(x=>x.id===cid)+1;document.getElementById('cm-txt').textContent=`「${m?m.name:''}」の${ordinal(num)}の記録を削除します。`;const mtnId=c.mtnId;document.getElementById('cok').onclick=async()=>{await _delPhotos(cid);climbs=climbs.filter(x=>x.id!==cid);saveAll();render();showDetail(mtnId);closeConfirm();toast('登頂記録を削除しました')};document.getElementById('confirm').classList.remove('hidden');}
function closeConfirm(){document.getElementById('confirm').classList.add('hidden')}
function openBadgeModal(){editingBadgeId=null;document.getElementById('bm-title').textContent='マイバッジを追加';document.getElementById('bm-icon').value='';document.getElementById('bm-name').value='';document.getElementById('bm-earned').checked=false;document.getElementById('badge-modal').classList.remove('hidden')}
function openEditBadge(id){const b=customBadges.find(x=>x.id===id);if(!b)return;editingBadgeId=id;document.getElementById('bm-title').textContent='バッジを編集';document.getElementById('bm-icon').value=b.icon||'';document.getElementById('bm-name').value=b.name||'';document.getElementById('bm-earned').checked=b.earned||false;document.getElementById('badge-modal').classList.remove('hidden')}
function closeBadgeModal(){document.getElementById('badge-modal').classList.add('hidden')}
function saveBadge(){const icon=document.getElementById('bm-icon').value.trim()||'🏅';const name=document.getElementById('bm-name').value.trim();if(!name){alert('バッジ名を入力してください');return}const earned=document.getElementById('bm-earned').checked;if(editingBadgeId!==null){const idx=customBadges.findIndex(b=>b.id===editingBadgeId);if(idx>=0)customBadges[idx]={...customBadges[idx],icon,name,earned};toast('バッジを更新しました ✓')}else{customBadges.push({id:Date.now(),icon,name,earned});toast('バッジを追加しました ✓')}saveAll();closeBadgeModal();renderBadges();}
function delCustomBadge(id){customBadges=customBadges.filter(b=>b.id!==id);saveAll();renderBadges();toast('バッジを削除しました')}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('hidden')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);if(e.key==='Escape')closeLb();return;}if(e.key==='Escape'){['mtn-modal','climb-modal','badge-modal'].forEach(id=>{if(!document.getElementById(id).classList.contains('hidden'))document.getElementById(id).classList.add('hidden')});}});
_initApp();
</script>

// ── Service Worker登録 ───────────────────────────────────
if('serviceWorker' in navigator){
  const swCode = `
const CACHE='mj-v2';
const ASSETS=[location.href];
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{self.clients.claim();});
self.addEventListener('fetch',e=>{
  e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
});
`;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(e=>console.log('SW:', e));
}
